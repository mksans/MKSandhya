jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the repository code onto the runner server
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Install and configure Python on the runner server
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up future runs by caching installed packages

    # 3. Install dependencies from your requirements.txt file
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Execute the pytest suite to verify code functionality
    - name: Run automated test suite
      run: |
        pytest
